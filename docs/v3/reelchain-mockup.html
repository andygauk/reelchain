<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reelchain — Gameplay-first mockup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #0B0D12;
    --bg-raised: #14171F;
    --gold: #D9A63D;
    --gold-dim: rgba(217,166,61,0.35);
    --ink: #F2EFE8;
    --ink-dim: #8E93A3;
    --slot-empty: #2A2E3A;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:#000; font-family:'Inter',sans-serif;}

  .stage{
    max-width:1400px; margin:40px auto; display:flex; gap:60px; justify-content:center; flex-wrap:wrap; padding:20px;
  }

  .caption{
    text-align:center; color:#999; font-size:13px; margin-bottom:14px; letter-spacing:.04em; text-transform:uppercase;
  }

  .phone{
    width:390px; height:780px; background:var(--bg); border-radius:40px; overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.6); position:relative; border:1px solid #1E212B;
    display:flex; flex-direction:column;
  }

  /* ---- Top bar: minimal, secondary meta tucked away ---- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px 8px; color:var(--ink-dim); font-size:12px; letter-spacing:.08em;
  }
  .brand{ font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.12em; color:var(--ink); font-size:15px; }
  .meta-tuck{ display:flex; align-items:center; gap:6px; color:var(--ink-dim); font-size:12px; }
  .meta-tuck svg{ width:13px; height:13px; opacity:.6; }

  /* ---- Poster strip ---- */
  .posters{ display:flex; height:230px; position:relative; }
  .poster{ flex:1; position:relative; overflow:hidden; }
  .poster img{ width:100%; height:100%; object-fit:cover; display:block; filter:brightness(0.72); }
  .poster .label{
    position:absolute; left:14px; bottom:12px; right:14px;
    font-family:'Oswald',sans-serif; font-weight:600; font-size:16px; letter-spacing:.02em;
    color:var(--ink); text-shadow:0 2px 10px rgba(0,0,0,.8); line-height:1.15;
  }
  .poster.a::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,0) 55%);
  }
  .poster.b::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,0) 55%);
  }
  .vs-divider{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:34px; height:34px; border-radius:50%; background:var(--gold);
    display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif;
    font-weight:700; color:#1a1200; font-size:13px; box-shadow:0 0 0 6px rgba(0,0,0,.55), 0 0 18px rgba(217,166,61,.6);
    z-index:2;
  }

  /* ---- Instruction line ---- */
  .instruction{
    text-align:center; padding:16px 24px 6px; color:var(--ink); font-size:14.5px;
  }
  .instruction b{ color:var(--gold); font-weight:600; }

  /* ---- Filmstrip chain track (the signature element) ---- */
  .chain-wrap{ padding:10px 22px 14px; }
  .filmstrip{
    position:relative; height:56px; display:flex; align-items:center;
  }
  .filmstrip .rail{
    position:absolute; left:20px; right:20px; top:50%; height:2px; background:var(--slot-empty); transform:translateY(-50%);
  }
  .filmstrip .rail-fill{
    position:absolute; left:20px; top:50%; height:2px; background:var(--gold); transform:translateY(-50%);
    width:0%; transition:width .3s ease;
  }
  .holes{ position:relative; display:flex; justify-content:space-between; width:100%; z-index:1; }
  .hole{
    width:40px; height:40px; border-radius:6px; background:var(--bg-raised);
    border:2px solid var(--slot-empty); display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:12px; color:var(--ink-dim); position:relative;
  }
  .hole.filled{ border-color:var(--gold); background:#1F1A0D; color:var(--gold); }
  .hole.next{ border-color:var(--gold); box-shadow:0 0 0 4px var(--gold-dim); animation:pulse 1.6s infinite; }
  .hole img{ width:100%; height:100%; object-fit:cover; border-radius:4px; }
  .hole.endpoint{ background:none; border:none; width:34px; height:34px; }
  .hole.endpoint svg{ width:100%; height:100%; }

  @keyframes pulse{
    0%,100%{ box-shadow:0 0 0 4px var(--gold-dim); }
    50%{ box-shadow:0 0 0 8px rgba(217,166,61,.15); }
  }

  .links-remaining{
    text-align:center; color:var(--ink-dim); font-size:12px; margin-top:8px; letter-spacing:.03em;
  }

  /* ---- Actor grid ---- */
  .actor-section{ padding:6px 20px 10px; flex:1; display:flex; flex-direction:column; }
  .actor-heading{
    color:var(--ink-dim); font-size:11px; text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; text-align:center;
  }
  .actor-grid{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:14px 10px; overflow-y:auto;
  }
  .actor{ display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; }
  .actor .headshot{
    width:64px; height:64px; border-radius:50%; overflow:hidden; border:2px solid #24283350;
    transition:border-color .15s, transform .15s;
  }
  .actor:hover .headshot{ border-color:var(--gold); transform:scale(1.04); }
  .actor .headshot img{ width:100%; height:100%; object-fit:cover; display:block; }
  .actor .name{ font-size:12px; color:var(--ink); text-align:center; line-height:1.2; }

  /* ---- Bottom action bar ---- */
  .actionbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px 22px; border-top:1px solid #1A1D26;
  }
  .hint-btn{
    display:flex; align-items:center; gap:6px; background:none; border:1px solid #2A2E3A;
    color:var(--ink-dim); font-size:13px; padding:9px 16px; border-radius:20px; font-family:'Inter';
  }
  .reset-btn{
    background:none; border:none; color:var(--ink-dim); font-size:13px;
  }
</style>
</head>
<body>

<div class="stage">
  <div>
    <div class="caption">Reelchain — synthesized concept</div>
    <div class="phone">

      <div class="topbar">
        <div class="brand">REELCHAIN</div>
        <div class="meta-tuck">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          streak 7
        </div>
      </div>

      <div class="posters">
        <div class="poster a">
          <img src="https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg" alt="Gladiator">
          <div class="label">GLADIATOR</div>
        </div>
        <div class="poster b">
          <img src="https://image.tmdb.org/t/p/w500/6oom5QYQ2yQTMJIbnvbkBL9cHo6.jpg" alt="Fellowship of the Ring">
          <div class="label">THE FELLOWSHIP<br>OF THE RING</div>
        </div>
        <div class="vs-divider">→</div>
      </div>

      <div class="instruction">
        Connect these films through <b>4 actors</b>
      </div>

      <div class="chain-wrap">
        <div class="filmstrip">
          <div class="rail"></div>
          <div class="rail-fill" style="width:22%"></div>
          <div class="holes">
            <div class="hole endpoint">
              <img src="https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg" style="border-radius:6px;object-fit:cover;width:100%;height:100%;">
            </div>
            <div class="hole filled">
              <img src="https://m.media-amazon.com/images/M/MV5BMTczMzMyODEyN15BMl5BanBnXkFtZTcwMTIzMTQ2OA@@._V1_.jpg">
            </div>
            <div class="hole next">?</div>
            <div class="hole">?</div>
            <div class="hole">?</div>
            <div class="hole endpoint">
              <img src="https://image.tmdb.org/t/p/w500/6oom5QYQ2yQTMJIbnvbkBL9cHo6.jpg" style="border-radius:6px;object-fit:cover;width:100%;height:100%;">
            </div>
          </div>
        </div>
        <div class="links-remaining">1 of 4 links placed · 3 to go</div>
      </div>

      <div class="actor-section">
        <div class="actor-heading">Tap the next actor in the chain</div>
        <div class="actor-grid">
          <div class="actor">
            <div class="headshot"><img src="https://m.media-amazon.com/images/M/MV5BMTgwMjk1NTYyNl5BMl5BanBnXkFtZTgwNTM1MjczMTE@._V1_.jpg"></div>
            <div class="name">Viggo Mortensen</div>
          </div>
          <div class="actor">
            <div class="headshot"><img src="https://m.media-amazon.com/images/M/MV5BMTk0NDQ4MzAzOF5BMl5BanBnXkFtZTcwMjU4MTMyMQ@@._V1_.jpg"></div>
            <div class="name">Sean Bean</div>
          </div>
          <div class="actor">
            <div class="headshot"><img src="https://m.media-amazon.com/images/M/MV5BMjA0OTMzMTkzMV5BMl5BanBnXkFtZTcwMTQ2MjEyMw@@._V1_.jpg"></div>
            <div class="name">Orlando Bloom</div>
          </div>
          <div class="actor">
            <div class="headshot"><img src="https://m.media-amazon.com/images/M/MV5BMTczMzMyODEyN15BMl5BanBnXkFtZTcwMTIzMTQ2OA@@._V1_.jpg"></div>
            <div class="name">Russell Crowe</div>
          </div>
          <div class="actor">
            <div class="headshot"><img src="https://m.media-amazon.com/images/M/MV5BMTg0NDgyMjEzNV5BMl5BanBnXkFtZTcwNzYxNjc3NA@@._V1_.jpg"></div>
            <div class="name">Cate Blanchett</div>
          </div>
          <div class="actor">
            <div class="headshot"><img src="https://m.media-amazon.com/images/M/MV5BMTQ2ODEyOTQ0MV5BMl5BanBnXkFtZTcwODA0NTM4OA@@._V1_.jpg"></div>
            <div class="name">Ian McKellen</div>
          </div>
        </div>
      </div>

      <div class="actionbar">
        <button class="hint-btn">💡 Hint</button>
        <button class="reset-btn">Reset ↻</button>
      </div>

    </div>
  </div>
</div>

</body>
</html>
