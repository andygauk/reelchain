name = "reelchain"
compatibility_date = "2024-09-23"
pages_build_output_dir = "deploy"

# KV binding for ReelChain analytics (event.js writes, stats.js reads).
# This git-connected Pages project is managed through wrangler.toml, so the
# binding lives here (the dashboard Bindings editor is locked). Namespace ID
# below was created once in Cloudflare dashboard → Workers & Pages → KV.
# Both functions read env.RC_ANALYTICS and fall back gracefully if unset.
[[kv_namespaces]]
binding = "RC_ANALYTICS"
id = "689982e872d64160b11eeed0117cd0cb"
