name = "reelchain"
compatibility_date = "2024-09-23"
pages_build_output_dir = "deploy"

# NOTE: The RC_ANALYTICS KV binding is configured in the Cloudflare Pages
# dashboard (Settings → Functions → KV namespace bindings), NOT here — git-connected
# Pages deploys do not read kv_namespaces from wrangler.toml, and an invalid
# id here breaks the build. Create the namespace once with:
#   wrangler kv namespace create RC_ANALYTICS
# then add it as a binding named RC_ANALYTICS in the dashboard.
# Until bound, /api/event still works (logs to Functions logs, kv:false on /api/stats).
